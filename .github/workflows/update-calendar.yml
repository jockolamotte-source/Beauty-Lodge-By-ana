name: Update Beauty Lodge Calendar

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-events:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install calendar parser
        run: pip install icalendar recurring-ical-events requests

      - name: Build events JSON
        env:
          CALENDAR_URL: https://calendar.google.com/calendar/ical/2d825d82fd73f29a31cc9ebbb991f27b0c1921e830468cc897d4e0742fb67e60%40group.calendar.google.com/public/basic.ics
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import date, datetime, time, timedelta, timezone
          from pathlib import Path

          import recurring_ical_events
          import requests
          from icalendar import Calendar

          calendar_url = os.environ["CALENDAR_URL"]
          response = requests.get(calendar_url, timeout=30)
          response.raise_for_status()

          calendar = Calendar.from_ical(response.content)
          now = datetime.now(timezone.utc)
          window_end = now + timedelta(days=730)

          components = recurring_ical_events.of(calendar).between(
              now,
              window_end,
          )

          events = []

          def as_datetime(value, is_end=False):
              if isinstance(value, datetime):
                  if value.tzinfo is None:
                      value = value.replace(tzinfo=timezone.utc)
                  return value

              if isinstance(value, date):
                  return datetime.combine(
                      value,
                      time.max if is_end else time.min,
                      tzinfo=timezone.utc,
                  )

              return None

          for component in components:
              if component.get("STATUS", "").upper() == "CANCELLED":
                  continue

              start_value = component.decoded("DTSTART")
              end_value = (
                  component.decoded("DTEND")
                  if component.get("DTEND")
                  else start_value
              )

              start_dt = as_datetime(start_value)
              end_dt = as_datetime(end_value, is_end=True)

              if not start_dt or not end_dt or end_dt < now:
                  continue

              all_day = (
                  isinstance(start_value, date)
                  and not isinstance(start_value, datetime)
              )

              events.append({
                  "title": str(component.get("SUMMARY", "Beauty Lodge Pop-Up")),
                  "description": str(component.get("DESCRIPTION", "")),
                  "location": str(component.get("LOCATION", "")),
                  "start": start_dt.isoformat(),
                  "end": end_dt.isoformat(),
                  "allDay": all_day,
              })

          events.sort(key=lambda event: event["start"])

          output = {
              "updatedAt": now.isoformat(),
              "events": events[:50],
          }

          output_path = Path("assets/events.json")
          output_path.parent.mkdir(parents=True, exist_ok=True)
          output_path.write_text(
              json.dumps(output, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit calendar changes
        run: |
          if git diff --quiet -- assets/events.json; then
            echo "No calendar changes found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/events.json
          git commit -m "Update upcoming Beauty Lodge events"
          git push
